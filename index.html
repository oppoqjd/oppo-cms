<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPPO旗舰店管理系统 - 测试</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, "PingFang SC", sans-serif; margin: 40px; background: #f5f5f5; }
    .card { background: white; border-radius: 12px; padding: 24px; max-width: 600px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #059669; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 14px; }
    .ok { background: #d1fae5; color: #065f46; }
  </style>
</head>
<body>
  <div id="root">
    <div class="card">
      <h1>✅ GitHub Pages 加载成功！</h1>
      <p>如果能看到这个页面，说明 GitHub Pages 正常工作。</p>
      <p class="status ok">状态：正常</p>
      <p style="color:#999;font-size:12px;margin-top:20px;">OPPO 旗舰店管理系统</p>
    </div>
  </div>
  <script type="text/babel">
    const App = () => {
      const [time, setTime] = React.useState(new Date().toLocaleTimeString('zh-CN'));
      React.useEffect(() => {
        const timer = setInterval(() => setTime(new Date().toLocaleTimeString('zh-CN')), 1000);
        return () => clearInterval(timer);
      }, []);
      return <div className="card"><h2>🕐 当前时间：{time}</h2><p>React 已加载成功！</p></div>;
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
